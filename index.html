<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' data: https://cdnjs.cloudflare.com; worker-src 'self' blob: https://cdnjs.cloudflare.com; connect-src 'self' blob: data: https://cdnjs.cloudflare.com;">
    
    <title>DarkPDF</title>
    <meta name="description" content="A privacy-first, zero-server local PDF reader. View documents in high-resolution dark mode with seamless IndexedDB recent files storage.">
    
    <link rel="icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><style>path{fill:%23111827;}@media(prefers-color-scheme:dark){path{fill:%23f5f5f5;}}</style><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>'>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf_viewer.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark filter-default">

    <div class="settings-panel" id="settings-panel">
        <div class="settings-group">
            <div class="settings-label">Theme</div>
            <div class="toggle-group" id="theme-toggles">
                <button class="toggle-btn" data-theme-val="theme-dark">Dark</button>
                <button class="toggle-btn" data-theme-val="theme-light">Light</button>
            </div>
        </div>
        <div class="settings-group">
            <div class="settings-label">Reading Filter</div>
            <div class="toggle-group" id="filter-toggles">
                <button class="toggle-btn" data-filter-val="filter-default">Default</button>
                <button class="toggle-btn" data-filter-val="filter-sepia">Sepia</button>
                <button class="toggle-btn" data-filter-val="filter-peach">Peach</button>
                <button class="toggle-btn" data-filter-val="filter-soft">Soft</button>
            </div>
        </div>
    </div>

    <div id="home-view" class="view is-active">
        <button class="btn-settings fixed-settings" title="Settings">
            <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
        </button>
        <div class="home-container">
            <section>
                <div class="section-header">Actions</div>
                <label class="upload-card" for="file-input">
                    <svg class="upload-card-icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11zM8 15.01l1.41 1.41L11 14.84V19h2v-4.16l1.59 1.59L16 15.01 12.01 11 8 15.01z"/></svg>
                    <span class="upload-card-text">Open File</span>
                    <input type="file" id="file-input" accept="application/pdf" />
                </label>
            </section>
            <section>
                <div class="section-header">Recent Files</div>
                <div class="list-group" id="recent-list"></div>
            </section>
        </div>
    </div>

    <div id="reader-view" class="view">
        <header class="topbar">
            <button class="btn" id="btn-close">Close</button>
            
            <div class="topbar-right">
                <div class="zoom-controls">
                    <button class="btn-icon" id="btn-zoom-out">−</button>
                    <span class="zoom-text" id="zoom-text" title="Click to Fit">Fit</span>
                    <button class="btn-icon" id="btn-zoom-in">+</button>
                </div>
                
                <div class="page-indicator" id="page-indicator">
                    <span id="page-num">1</span> / <span id="page-count">-</span>
                </div>

                <button class="btn-settings" title="Settings">
                    <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
                </button>
            </div>
        </header>
        <main class="document-container" id="pdf-container"></main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
